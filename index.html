<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爆发的灵感</title>
  <script type="module" crossorigin src="/BurstOfInspiration/assets/index-DpLYsr_E.js"></script>
  <link rel="stylesheet" crossorigin href="/BurstOfInspiration/assets/index-t7PIwoKp.css">
</head>
<body>
  <div id="app"></div>

<script>
// 安全写入 localStorage（防 Safari 隐私报错）
function safeSet(key, val) {
  try {
    localStorage.setItem(key, val);
  } catch (e) {
    console.warn('localStorage 写入失败（可能隐私模式）', e);
  }
}
function safeGet(key) {
  try {
    return localStorage.getItem(key) || '';
  } catch (e) {
    console.warn('localStorage 读取失败', e);
    return '';
  }
}

// 绑定保存逻辑
function bindSave() {
  const textElems = document.querySelectorAll('textarea, input[type="text"]');
  textElems.forEach((el, idx) => {
    const key = 'save_content_' + idx;
    // 恢复
    el.value = safeGet(key);
    // 实时保存
    el.addEventListener('input', function () {
      safeSet(key, this.value);
    });
  });
}

// 兼容 Safari：pageshow 比 load 更可靠
window.addEventListener('pageshow', function () {
  // 等 Vue 渲染完
  requestAnimationFrame(() => {
    bindSave();
  });
});
</script>

</body>
</html>
